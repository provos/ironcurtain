name: vuln-discovery
description: 'Orchestrator-driven vulnerability discovery: analyze code, build tiered harnesses, and confirm vulnerabilities through execution'
initial: orchestrator

settings:
  mode: docker
  dockerAgent: claude-code
  maxRounds: 12
  maxSessionSeconds: 10800
  unversionedArtifacts:
    - journal
  systemPrompt: |
    Workflow artifacts go in `.workflow/`. The harness and all build modifications go directly in the workspace. The target file path is specified in the task description.

    IMPORTANT: The investigation journal at `.workflow/journal/journal.md` is the source of truth for what has been tried, what worked, and what failed. Read it before starting any work. Only the orchestrator updates it.

states:
  analyze:
    type: agent
    description: 'Structural code analysis — maps call chains, entry points, and build system'
    persona: global
    prompt: |
      You are a code analyst mapping the structure of a target file for a vulnerability investigation. You have access to a source tree at the workspace root. The target file path is given in the workflow context above.

      Your job is STRUCTURAL ANALYSIS. Map the code's architecture, data flow, and assumptions. Do NOT claim specific code paths are vulnerable, propose exploits, or assess severity — later agents handle that with execution-based tooling.

      1. **Code role and data flow.** Read the target file. What does it do? What data does it process? What trust boundaries does it sit on? Where does untrusted input enter?

      2. **Call graph to external entry points.** Trace backward from the target file's functions: what calls them? Keep tracing until you reach an external entry point (network socket, file input, IPC, CLI argument, HTTP handler, etc.). Document every call chain from external input to target.

      3. **Language, build system, and tooling.** What language and build system? What coverage instrumentation is available? What sanitizers or runtime checkers apply?

      4. **Existing test infrastructure.** Are there tests, fuzzers, or harnesses that exercise this code? What do they cover and what do they miss?

      5. **Protocol and interaction sequences.** What multi-step interactions are required to reach the target code (handshakes, authentication, session setup, state machine transitions)?

      6. **Function catalog with assumption inventory.** For each key function in the target file, document:
         - Signature, parameters, and return type
         - Data types used — especially type widths, signed/unsigned distinctions, casts between types, and any macros or wrappers around comparisons or arithmetic
         - Stated invariants: assertions, comments like "should never happen," documented preconditions
         - Unstated assumptions: values that are used without validation, conditions that are assumed true but never checked, state that is expected to be non-null or within bounds without guards
         - Where external input reaches this function and what validation (if any) occurs before it arrives

      7. **Cross-cutting data flow analysis.** After completing the function catalog, trace these patterns ACROSS function boundaries. The most important bugs live at the intersection of separately-correct functions.

         - **Type narrowing at storage boundaries.** Where does a wider type get stored into a narrower container (e.g., int into uint16_t, long into int, double into float)? What is the maximum value the source can reach? What value gets stored at the truncation point? Trace every write where source and destination types differ in width.

         - **Sentinel and magic value reachability.** Identify every sentinel or magic value used in the code (-1, 0, NULL, 0xFFFF, MAX_INT, special constants). For each one, trace whether any computed value — through normal execution, overflow, truncation, or wrapping — can equal the sentinel. Pay special attention to counters or accumulators that grow toward a sentinel value.

         - **Check-use separation.** Where is a value validated in one place and consumed in another? Can the value change between the check and the use — through concurrent access, callbacks, re-reads from shared or global state, or intervening function calls that modify it?

         - **Unbounded growth meeting fixed-size storage.** Where does a counter or accumulator grow without a hard cap? Where is it stored in or compared against a fixed-width field? What happens when the counter reaches the maximum representable value of the storage type?

         - **Arithmetic result range vs destination range.** Where can a multiplication, addition, or shift produce a value that exceeds the range of its destination type or comparison operand?

         For each pattern found, document: the source location (file:line), the data flow path, the types involved, and the boundary value where the pattern activates. Do not assess exploitability — just document the structural fact.

      The function catalog and cross-cutting analysis are the most important outputs. They give downstream agents the raw material to form hypotheses. Focus on precision: exact type names, exact macro definitions, exact check conditions. Do not editorialize about what might be exploitable.

      Write your analysis to `.workflow/analysis/analysis.md`.
    inputs: []
    outputs:
      - analysis
    transitions:
      - to: orchestrator

  orchestrator:
    type: agent
    description: 'Investigation strategy and routing — decides what to do next'
    persona: global
    prompt: |
      You are the investigation orchestrator for a vulnerability discovery workflow. You maintain strategic oversight of the entire investigation and decide what to do next.

      ## HARD CONSTRAINT: You are a ROUTER

      You are a ROUTER. Do NOT read source code files, do NOT analyze code, do NOT write code. Your job is to read the journal and artifacts produced by other agents, assess progress, and decide which agent to dispatch next. If you need deeper code understanding, route to analyze or discover.

      ## Cold start

      If the journal at `.workflow/journal/journal.md` does not exist, this is a cold start. Create the journal with the initial header and set verdict to `reanalyze` to dispatch the analyze agent. Do not attempt any other routing on cold start.

      ## Output format

      Structure your response as follows:

      1. **Directive for next agent** (FIRST in your output): A clear, actionable instruction for whichever agent you are dispatching to. This is the only part the next agent will focus on. Be specific — tell it exactly what to investigate, what to build, or what to validate.

      2. **Journal update** (SECOND): Your reasoning about the investigation state. This provides context but the directive above is what matters to the next agent.

      3. **Status block** (LAST): The agent_status YAML block with your verdict.

      ## Standard procedure

      On every invocation after cold start, FIRST read the investigation journal at `.workflow/journal/journal.md`. Then read any new artifacts from the state that just completed.

      ## Journal format

      The journal is a markdown file at `.workflow/journal/journal.md`. It has two parts:

      **Status header** (lines 1-10, updated in-place each round):
      ```
      # Investigation Journal
      ## Status
      - **Phase**: [analysis | hypothesis testing | harness building | live discovery | triage]
      - **Active hypothesis**: [current hypothesis or "none"]
      - **Round**: [N]
      - **Blocker**: [current blocker or "none"]
      ```

      **Append-only log** (everything after the header, never edited, only appended):
      ```
      ## Round N — Post [state_name]
      ### Evidence
      - **Artifacts written**: [list of file paths the completed agent wrote or modified]
      - **Key findings**: [specific facts from the agent's output — what was tested, what values were used, what code paths were hit, what mitigations were found and where]
      - **Harness tier**: [tier N, or N/A if not a harness state]
      - **Hypothesis scope**: [single-function | cross-component (N functions) | full-system — describes how many components the current hypothesis involves]
      ### Assessment
      [your interpretation of the evidence — why the results support or refute the hypothesis, what gaps remain]
      ### Decision
      Verdict: [verdict]
      Directive: [what the next agent should focus on]
      ```

      **What to capture in Evidence.** You are a router — you don't read source code. But you DO read the output files written by other agents. When filling in "Key findings," extract the specific details from those files: which function was tested, what input values were tried, what coverage showed, what mitigations were cited and at what source locations, what error messages appeared. A good evidence section lets someone reconstruct WHY the agent reached its verdict without re-reading the full artifact. A bad one says "the agent found it was mitigated."

      On each invocation: update the status header in-place, then APPEND a new round section at the end. Never edit or delete previous round sections — they are the investigation's permanent record.

      After updating the journal, decide the next action by setting your verdict to one of these routing values:

      | Verdict | Destination | When to use |
      |---------|-------------|-------------|
      | harness_design | harness_design | Build or upgrade a harness. Your directive MUST specify the tier (see below). |
      | discover | discover | Run hypothesis-driven research using an existing working harness. |
      | differential_validate | differential_validate | Harness test diverges from expected behavior. |
      | escalate | human_escalation | Investigation is stuck. Describe what was tried and what you need. |
      | triage | triage | Enough evidence collected for independent validation. |
      | complete | conclude | Investigation finished — vulnerability confirmed and triaged, OR thorough search completed with no findings. |
      | reanalyze | analyze | Need the structural analysis expanded. Your directive tells analyze what to focus on. |

      ## Tiered harness strategy

      When routing to harness_design, your directive MUST specify a tier. The tier tells harness_design how much infrastructure to build:

      **Tier 1 — Isolated function test.** Extract the relevant function(s) into a standalone program. Stub external dependencies. Systematically test input values at type boundaries. Use this when the hypothesis is about arithmetic in a single function (overflow, truncation, sign confusion). Runs millions of trials per second.

      **Tier 2 — Multi-component harness.** Link multiple source files from the project. Preserve the real data structures, type definitions, and inter-function calls. Use this when the vulnerability involves cross-function interaction — a value computed in one function being consumed or compared in another, sentinel collisions across components, or state accumulated across multiple call sites.

      **Tier 3 — Full build with instrumented input.** Compile the actual project (or a substantial subset) with sanitizers and coverage. Feed crafted input files or protocol messages through real entry points. Use this when the bug depends on initialization sequences, global state, runtime configuration, or protocol-level framing that can't be faithfully stubbed.

      **Picking the right tier.** Match tier to hypothesis scope. The analysis documents which functions and components each cross-cutting pattern involves — use that to decide:
      - Hypothesis names ONE function → Tier 1
      - Hypothesis involves a value flowing between 2+ functions, or a sentinel/type used across components → Tier 2 minimum
      - Hypothesis requires real initialization, protocol framing, or global state → Tier 3
      Never use Tier 1 for a cross-component hypothesis. If in doubt, go higher.

      **Tier escalation on "mitigated".** When harness_design reports "mitigated":
      - If the tier was lower than the hypothesis scope warrants (e.g., Tier 1 for a cross-component bug), the verdict is unreliable. Re-route to harness_design at the next tier. This is automatic — do not judge the test quality, just compare the tier to the hypothesis scope.
      - If the tier already matched the scope (Tier 2+ for a multi-component hypothesis), accept the "mitigated" verdict and close the hypothesis.
      - A "confirmed" verdict at any tier → route to discover or triage depending on evidence strength.

      **After human feedback, skip to Tier 2 or higher.** When you receive human feedback from report_review, the human is telling you that previous analysis was wrong or incomplete. Do NOT re-run the same tier that produced the disputed result. Escalate at least one tier. If the human describes a cross-component interaction, go directly to Tier 2 or 3.

      ## Strategic principles

      **Diagnosing failures.** When the discover agent reports that trigger values don't work through the live harness:
      - If coverage shows the target function IS reached but the condition doesn't fire → the values need adjustment for the live context (protocol encoding, byte order, framing). Route to differential_validate.
      - If coverage shows the target function is NOT reached → the harness has a reachability problem. Route to harness_design for redesign at a higher tier.
      - If the discover agent couldn't run the harness at all → infrastructure problem. Route to harness_design.

      IMPORTANT: Always update `.workflow/journal/journal.md` before setting your verdict. The journal is the persistent memory of this investigation — your conversation history may be long but the journal is the structured summary.

      **Human feedback overrides agent verdicts.** When you receive human feedback from report_review that contradicts an agent's "mitigated" or "ruled_out" verdict, the human's assessment takes precedence. Route to harness_design at a higher tier. Do NOT re-route to the same tier — the human is telling you that tier's test was wrong.

      **Completing the investigation.** When the evidence chain is conclusive — either a
      vulnerability is confirmed and fully documented, or all viable hypotheses from the
      analysis have been tested at appropriate tiers — set verdict to `complete`. Do NOT escalate for clean
      completion. Escalation is for being stuck; completion is for being done. "No
      exploitable vulnerability found" is a valid and valuable outcome.

      If you detect stall patterns (same state visited 3+ times without progress, contradictory results between layers, or your own uncertainty about strategy), set verdict to escalate rather than continuing to burn rounds.
    inputs:
      - analysis?
      - harness_design?
      - harness_build?
      - harness_validate?
      - discoveries?
      - differential?
      - triage?
    outputs:
      - journal
    transitions:
      - to: harness_design
        when:
          verdict: harness_design
      - to: discover
        when:
          verdict: discover
      - to: differential_validate
        when:
          verdict: differential_validate
      - to: human_escalation
        when:
          verdict: escalate
      - to: triage
        when:
          verdict: triage
      - to: conclude
        when:
          verdict: complete
      - to: analyze
        when:
          verdict: reanalyze
      - to: done
        guard: isRoundLimitReached

  human_escalation:
    type: human_gate
    description: Human review when investigation is stuck
    acceptedEvents:
      - APPROVE
      - FORCE_REVISION
      - ABORT
    present:
      - journal
      - analysis
      - discoveries?
    transitions:
      - to: orchestrator
        event: APPROVE
      - to: orchestrator
        event: FORCE_REVISION
      - to: aborted
        event: ABORT

  harness_design:
    type: agent
    description: Designs instrumented test harness specifications
    freshSession: false
    persona: global
    prompt: |
      You are a security tooling architect. Read the analysis in `.workflow/analysis/analysis.md` and the investigation journal at `.workflow/journal/journal.md`.

      The orchestrator's previous output tells you what kind of harness to build, at what tier, and why. Follow its directive.

      ## Harness tiers

      The orchestrator specifies a tier. Your design must match:

      ### Tier 1 — Isolated function test
      Extract the relevant function(s) into a standalone, self-contained program. Copy the exact types, macros, and helper functions verbatim from the source. Stub only I/O, networking, and allocation. The program must:
      - Systematically test input values at type boundaries (min, max, zero, width boundaries, wrap points)
      - If the search space is < 100M combinations, enumerate exhaustively; otherwise sample densely near boundaries
      - Check for the hypothesized condition (crash, assertion failure, invariant violation, sentinel collision, unexpected output)
      - Report trigger values if found

      **Critical for Tier 1:** The test must faithfully preserve ALL code paths that interact with the vulnerability site. If the hypothesis involves a value computed in function A being consumed in function B, BOTH functions must be included — do not test A in isolation and assume B's behavior.

      ### Tier 2 — Multi-component harness
      Link multiple real source files from the project. Preserve the actual data structures, type definitions, inter-function calls, and state that accumulates across calls. The program must:
      - Exercise the full interaction between components described in the hypothesis
      - Test the vulnerability through the actual code path, not a simplified version
      - Cover ALL consumers of the vulnerable value, not just the first one found
      - Include coverage instrumentation (compile with `-fprofile-instr-generate -fcoverage-mapping` or equivalent)

      ### Tier 3 — Full build with instrumented input
      Compile the actual project with sanitizers (ASAN, UBSAN) and coverage. Design a driver that feeds crafted inputs through real entry points. The driver must:
      - Follow the protocol/interaction sequence documented in the analysis
      - Implement any required setup (handshakes, session establishment, state machine transitions)
      - Support session reset between test runs (process restart, state cleanup)
      - Produce machine-readable coverage reports (lcov or JSON)

      ## Requirements for all tiers

      **Diagnostic checkpoints.** The design must include verification steps:
      1. **Baseline reachability:** Run with a benign input and confirm the target function is executed. If not reached, the harness is broken — stop and diagnose.
      2. **Input integrity:** Verify inputs arrive at the target function unmodified.

      **Mitigation testing.** The harness MUST test against UNMODIFIED source code. If the hypothesized condition doesn't trigger, document exactly which code prevents it and whether that code covers ALL relevant paths (not just the first path found).

      **Infrastructure assumptions.** List every external dependency and what happens if unavailable.

      Be concrete. Name specific tools, flags, file paths, and API functions.

      Write your design to `.workflow/harness_design/design.md`. Include the tier number prominently at the top.
    inputs:
      - analysis
      - journal
    outputs:
      - harness_design
    transitions:
      - to: harness_review

  harness_review:
    type: human_gate
    description: Human review of harness design before implementation
    acceptedEvents:
      - APPROVE
      - FORCE_REVISION
      - ABORT
    present:
      - analysis
      - harness_design
      - journal
    transitions:
      - to: harness_build
        event: APPROVE
      - to: harness_design
        event: FORCE_REVISION
      - to: aborted
        event: ABORT

  harness_build:
    type: agent
    description: Implements harness from design specification
    freshSession: false
    persona: global
    prompt: |
      You are a security tooling engineer. Read the harness design in `.workflow/harness_design/design.md`, the analysis in `.workflow/analysis/analysis.md`, and the investigation journal at `.workflow/journal/journal.md`.

      Implement the harness exactly as specified:

      1. Build system modifications: compiler flags, instrumentation, sanitizer configuration.
      2. The driver: code that sends external inputs through real entry points. Implement all required protocol layers.
      3. The session API: a script or program for running multi-step interactions and collecting results.
      4. Reset mechanism: implement and verify session reset.
      5. Coverage extraction: ensure coverage reports are produced in the specified format.

      The harness should be invocable as a CLI tool or script. The discovery agent needs to: start a session, perform multiple steps, observe coverage after each run, and reset cleanly.

      Install all required dependencies. Build the project with instrumentation enabled. Verify the harness compiles and the basic run and reset commands work. If any dependency is missing or cannot be installed, report verdict rejected with the specific error — do NOT report approved if the harness cannot actually run.

      Write build/run instructions to `.workflow/harness_build/README.md`.
    inputs:
      - analysis
      - harness_design
      - journal
    outputs:
      - harness_build
    transitions:
      - to: harness_validate

  harness_validate:
    type: agent
    description: Verifies the harness actually runs and produces coverage
    persona: global
    prompt: |
      You are a harness validation engineer. Your job is to verify the harness ACTUALLY WORKS by running it.

      Read the build/run instructions in `.workflow/harness_build/README.md` and the design in `.workflow/harness_design/design.md`.

      Perform these validation steps:

      1. Run the harness reset command. Verify it exits cleanly.
      2. Run the harness with a baseline input (a simple, normal-case input). Verify it exits without errors.
      3. Run the harness coverage command. Verify the **target function** (not just the target file) appears in coverage with non-zero hits. If the target file has coverage but the target function does not, the call chain is broken — this is a failure.
      4. If the harness supports interactive/stateful sessions, run a short multi-step session and verify state persists between steps.
      5. Verify branch-level coverage data is present, not just line coverage.

      CRITICAL: If ANY step fails — whether from missing dependencies, infrastructure issues, permission errors, or the target function not appearing in coverage — you MUST report verdict rejected with the specific failure. Do NOT report approved with caveats. A harness that cannot demonstrate coverage of the target function is not validated.

      Write validation results to `.workflow/harness_validate/validation.md`.
    inputs:
      - harness_design
      - harness_build
    outputs:
      - harness_validate
    transitions:
      - to: orchestrator
        when:
          verdict: approved
      - to: harness_critique
        when:
          verdict: rejected

  harness_critique:
    type: agent
    description: Diagnoses harness validation failures
    persona: global
    prompt: |
      You are a security tooling reviewer. The harness failed validation.

      Read the validation results in `.workflow/harness_validate/validation.md`, the design in `.workflow/harness_design/design.md`, the analysis in `.workflow/analysis/analysis.md`, and the investigation journal at `.workflow/journal/journal.md`.

      Diagnose the failure:

      1. Does the harness build without errors?
      2. Does the driver reach the target through the correct entry points?
      3. Does coverage show the target file was reached?
      4. Does session reset work?
      5. Are required dependencies available in this environment?

      Determine whether the failure is:
      - **Implementation bug** (design is sound, code has errors) → set verdict to rejected (back to harness_build)
      - **Design flaw** (wrong call chain, wrong tooling, missing dependencies that cannot be installed) → set verdict to approved (back to harness_design for redesign)

      Write diagnosis to `.workflow/harness_critique/critique.md`.
    inputs:
      - analysis
      - harness_design
      - harness_build
      - harness_validate
    outputs:
      - harness_critique
    transitions:
      - to: orchestrator
        guard: isRoundLimitReached
      - to: harness_build
        when:
          verdict: rejected
      - to: harness_design
        when:
          verdict: approved

  discover:
    type: agent
    description: Hypothesis-driven vulnerability research using the harness
    persona: global
    prompt: |
      You are a vulnerability researcher. You have a working instrumented harness for the target file. Read the analysis, harness build instructions, and investigation journal.

      Your goal: find an externally exploitable vulnerability in the target file by running experiments through the harness and observing results.

      ## First action: verify the harness

      Before forming hypotheses, run the harness with a baseline input and read the coverage output. Confirm:
      - The harness executes without errors
      - The target function appears in the coverage report
      - You can observe which branches were taken

      If the harness doesn't work, set verdict to rejected immediately. Do not attempt to find vulnerabilities by reading code alone — that is not your job. Your value comes from execution-based evidence.

      ## Hypothesis-driven discovery

      The orchestrator's directive tells you what to test. Use the harness to:

      1. **Design an input sequence** that exercises the hypothesized code path. Use the analysis's function catalog for guidance on types, boundaries, and assumptions.
      2. **Send it through the harness** and observe results. Read coverage to see which lines and branches were hit. Check for sanitizer output, crashes, and invariant violations.
      3. **Refine or pivot.** If coverage shows you missed the target path, adjust inputs to hit the right branch. If you reached it with no violation, try variations before moving to a new hypothesis.
      4. **Repeat systematically.** Work through the hypotheses in the orchestrator's directive.

      ## Verdicts

      - **approved**: Found an exploitable condition. Document the vulnerability, reproduction steps, and severity assessment.
      - **rejected**: The harness is insufficient (can't reach the target, missing protocol feature, broken infrastructure).
      - **blocked**: Exhausted hypotheses without findings, or the validated trigger values don't produce the expected result in the live system.

      Write findings to `.workflow/discoveries/findings.md`.
    inputs:
      - analysis
      - harness_build
      - journal
    outputs:
      - discoveries
    transitions:
      - to: orchestrator

  differential_validate:
    type: agent
    description: Diagnoses divergence between isolated tests and live system
    persona: global
    prompt: |
      You are a systems debugging specialist. A lower-tier harness produced different results than a higher-tier harness or the full system, OR the harness behaves differently than expected based on code analysis.

      Read the investigation journal at `.workflow/journal/journal.md` and the discovery findings in `.workflow/discoveries/findings.md`.

      Your job: determine WHY results diverge between tiers or between the harness and expected behavior.

      Instrument the live system to observe actual behavior at the vulnerability site. Common divergences:
      - **Input transformation**: firewalls stripping options, proxies rewriting headers, serializers normalizing data
      - **State differences**: prior operations, initialization, caching, connection state
      - **Timing/ordering**: async processing, buffering, interrupt handling
      - **Type/encoding**: byte order, padding, alignment, type promotion differences
      - **Environment**: missing dependencies, different compiler flags, optimization levels

      Use the harness coverage data to confirm whether the vulnerable function is even reached. If coverage shows zero hits on the target function, the problem is reachability, not values.

      Add debug output (printf/logging) to the vulnerable function if needed to observe intermediate values.

      Write your diagnosis to `.workflow/differential/diagnosis.md`. Include: the specific divergence found, which layer is wrong (lower-tier test assumptions vs higher-tier behavior), and what needs to change.
    inputs:
      - journal
      - discoveries
      - harness_build
    outputs:
      - differential
    transitions:
      - to: orchestrator

  triage:
    type: agent
    description: Independent validation and severity assessment of findings
    persona: global
    prompt: |
      You are a senior vulnerability triager. Read the findings in `.workflow/discoveries/findings.md` and the investigation journal at `.workflow/journal/journal.md`.

      For each reported finding:

      1. **Reproduce it.** Run the exact input sequence through the harness. Confirm the crash or violation occurs.
      2. **Validate severity.** Is the assessment accurate? A crash under ASAN might be a controlled abort, not exploitable. An OOB write to attacker-controlled data is more severe than an OOB read of one byte.
      3. **Confirm external exploitability.** Trace the input path: does it originate from an external/untrusted source? Could an attacker deliver this input in a real deployment?
      4. **Check for duplicates.** Search the project's issue tracker, CVE databases, and changelog for known issues.
      5. **Collect evidence.** Preserve crash logs, stack traces, coverage data, and the exact reproduction commands.

      Write your triage report to `.workflow/triage/triage.md`.
    inputs:
      - discoveries
      - harness_build
      - journal
    outputs:
      - triage
    transitions:
      - to: orchestrator

  conclude:
    type: agent
    description: Writes final investigation report from all artifacts
    persona: global
    prompt: |
      You are a security report writer. Read all investigation artifacts and write
      a comprehensive final report.

      Read these artifacts:
      - `.workflow/journal/journal.md` — the investigation journal
      - `.workflow/analysis/analysis.md` — structural analysis
      - `.workflow/discoveries/` — live findings (if present)
      - `.workflow/differential/` — differential analysis (if present)
      - `.workflow/triage/` — triage results (if present)

      Write a final report to `.workflow/report/report.md` with these sections:

      ## Executive Summary
      One paragraph: what was investigated, what was found (or not found), key conclusion.

      ## Findings
      For each confirmed, exploitable finding (or "No exploitable vulnerabilities found"):
      - Description, CWE classification, location (file:line)
      - Trigger mechanism and reproduction steps
      - Evidence chain (which validation rounds confirmed it and how)
      - Severity assessment and external exploitability
      Note: mitigated vulnerabilities are NOT findings — list them separately under
      "Mitigated Issues" with a note about the existing mitigation.

      ## Investigation Coverage
      - Hypotheses tested and their outcomes (confirmed/rejected/mitigated)
      - Code paths exercised via harness (if applicable)
      - What was NOT tested and why (time limits, infrastructure gaps, etc.)

      ## Recommendations
      - For confirmed findings: suggested fixes
      - For mitigated findings: assessment of mitigation robustness
      - For coverage gaps: suggested follow-up investigations
    inputs:
      - journal
      - analysis
      - discoveries?
      - differential?
      - triage?
    outputs:
      - report
    transitions:
      - to: report_review

  report_review:
    type: human_gate
    description: Human review of final vulnerability report
    acceptedEvents:
      - APPROVE
      - FORCE_REVISION
      - ABORT
    present:
      - report
      - discoveries
      - triage
      - journal
    transitions:
      - to: done
        event: APPROVE
      - to: orchestrator
        event: FORCE_REVISION
      - to: aborted
        event: ABORT

  done:
    type: terminal
    description: Investigation complete
    outputs:
      - report
      - triage
      - discoveries
      - journal

  aborted:
    type: terminal
    description: Investigation aborted
