name: evolve
description: 'Evolve - multi-round evaluator-driven candidate search via an orchestrator hub: sampling, cognition, and per-round analysis.'
initial: preflight

settings:
  mode: docker
  dockerAgent: claude-code
  sharedContainer: true
  model: anthropic:claude-sonnet-4-6
  # Safety backstop for a wedged orchestrator hub, NOT the round budget.
  # isRoundLimitReached trips when the most-visited state (the orchestrator,
  # entered ~4 times per evolution round) reaches this count. Set well above
  # 4 * run_spec.budget.max_rounds + 1 so a legitimate long run is never capped
  # before the orchestrator emits `complete`; the real round budget is enforced
  # by the orchestrator against run_spec.budget.max_rounds.
  maxRounds: 200

states:
  preflight:
    type: agent
    description: Define the run spec, initialize the run, and author the cognition seed.
    persona: global
    prompt: |
      You are configuring a multi-round Evolve experiment. The task describes a
      program-search objective with an evaluator that prints a score.

      Do ALL of these, in order, then finish with the required agent_status block:

      1. Initialize the run by executing the evolve-brief helper. The run lives under
         /workspace/.evolve_runs/main/. Use these flags, filling OBJECTIVE and EVAL_CMD
         from the task (set --max-rounds to the requested number of rounds, default 3):

         /opt/workflow-venv/bin/python /workflow-scripts/evolve-brief normalize \
           --workspace-root /workspace \
           --run-name main \
           --objective "OBJECTIVE" \
           --core-score eval_score \
           --evaluation-command "EVAL_CMD" \
           --evaluation-timeout-secs 30 \
           --success-criterion "eval_score >= 1.0" \
           --max-rounds 3 \
           --patience 2 \
           --stop-condition "max_rounds" \
           --writable-path .evolve_runs \
           --primary-target candidate.py \
           --sampling-algorithm greedy \
           --sample-n 1 \
           --cognition-source-mode seed \
           --confirmed true

         EVAL_CMD must read the candidate at {quoted_code_path}, run it, and write a JSON
         file at {quoted_results_path} containing an "eval_score" number. Candidate files
         may be extensionless, so Python evaluators must load them with runpy.run_path or
         exec(compile(...)); do not rely on importlib.util.spec_from_file_location for
         {quoted_code_path}.

      2. Write a cognition seed file at /workspace/.evolve_runs/main/cognition_seed.md
         containing one or more ```json fenced blocks of reusable domain heuristics for
         this objective. Do not put round-by-round results here; only durable knowledge.

      3. Copy the human-review artifacts into the workflow artifact directory:

         mkdir -p /workspace/.workflow/run_spec /workspace/.workflow/cognition_seed
         cp /workspace/.evolve_runs/main/run_spec.yaml /workspace/.workflow/run_spec/run_spec.md
         cp /workspace/.evolve_runs/main/cognition_seed.md /workspace/.workflow/cognition_seed/cognition_seed.md

      4. Confirm evolve-brief exited 0, run_spec.yaml exists, and both workflow
         artifact copies exist.

      If a human directive is present at the top of this message, treat it as
      authoritative. Adjust the objective, evaluator command, budget, or cognition
      seed exactly as directed before re-emitting ready. FORCE_REVISION preserves
      the validity of existing nodes; if the objective fundamentally changes, abort
      this run and start a fresh one instead of reusing stale nodes.

      If the task lacks an objective or an evaluator you cannot construct, set verdict: blocked.
      Otherwise set verdict: ready.
    inputs: []
    outputs:
      - run_spec
      - cognition_seed
    transitions:
      - to: preflight_review
        when: { verdict: ready }
      - to: failed
        when: { verdict: blocked }

  preflight_review:
    type: human_gate
    description: >
      Human approval of the run spec, objective, evaluator command, and cognition
      seed before the first evaluator runs.
    acceptedEvents: [APPROVE, FORCE_REVISION, ABORT]
    present:
      - run_spec
      - cognition_seed
    transitions:
      - to: orchestrator
        event: APPROVE
      - to: preflight
        event: FORCE_REVISION
        actions:
          - { type: resetVisitCounts, stateIds: [preflight, orchestrator] }
      - to: aborted
        event: ABORT

  orchestrator:
    type: agent
    description: Central router. Reads the durable run state and routes the next phase.
    persona: global
    prompt: |
      You are the Evolve orchestrator - the central router for a bounded multi-round
      search. On every turn you read the durable run state and emit exactly ONE routing
      verdict in your agent_status block. You do not write candidates, run evaluators,
      or record nodes; you only decide what happens next.

      Read these two files first:
        - /workspace/.evolve_runs/main/run_spec.yaml - budget.max_rounds is N.
        - /workspace/.evolve_runs/main/database_data/nodes.json - count its "nodes" map.
          The file is absent before round 1, which means done_rounds = 0.

      Also inspect /workspace/.evolve_runs/main/current/. It is overwritten each round:
        - context.json means sampling for the in-flight round is done.
        - result.json means evaluation for the in-flight round is done.
        - analysis.md means analysis for the in-flight round is done.
        - analysis_record.json means the round was recorded.

      If a human directive in this message requests additional rounds, for example
      "run 2 more rounds", treat the effective budget as done_rounds + that number
      for this turn. Emit design to start the next round instead of complete. Do
      not rewrite run_spec.yaml; extra rounds append new nodes to nodes.json like
      normal rounds. Once done_rounds reaches that extended target, emit complete
      again.

      Decide and emit one verdict:
        - complete  - if done_rounds >= max_rounds.
        - design    - if done_rounds < max_rounds and no round is in-flight.
        - evaluate  - if the in-flight round has a candidate written but no result.json yet.
        - analyze   - if the in-flight round has a result.json but no analysis.md yet.
        - record    - if the in-flight round has an analysis.md but is not yet committed.
        - escalate  - only if the run is unrecoverable.

      Finish with the required agent_status block carrying exactly one of those verdicts.
    inputs: []
    outputs: []
    transitions:
      - to: failed
        guard: isRoundLimitReached
      - to: sample
        when: { verdict: design }
      - to: evaluate
        when: { verdict: evaluate }
      - to: analyzer
        when: { verdict: analyze }
      - to: analysis_record
        when: { verdict: record }
      - to: final_summary
        when: { verdict: complete }
      - to: human_escalation
        when: { verdict: escalate }

  sample:
    type: deterministic
    description: Sample a parent node and retrieve cognition; seed cognition on first entry.
    container: true
    resultFile: .evolve_runs/main/current/sample.json
    run:
      - [
          '/opt/workflow-venv/bin/python',
          '/workflow-scripts/evolve_result.py',
          'sample',
          '--run-dir',
          '/workspace/.evolve_runs/main',
          '--query-from-spec',
          '--context-file',
          '/workspace/.evolve_runs/main/current/context.json',
          '--result-file',
          '/workspace/.evolve_runs/main/current/sample.json',
        ]
    transitions:
      - to: researcher
        when: { verdict: sampled }
      - to: failed
        when: { verdict: sample_error }
      - to: failed
        when: { verdict: result_file_error }
      - to: failed

  researcher:
    type: agent
    description: Evolve one candidate from the sampled parent and retrieved cognition.
    persona: global
    prompt: |
      Write exactly one candidate program for this round.

      Read the round context at /workspace/.evolve_runs/main/current/context.json. It
      contains:
        - step_name: the directory you must write the candidate into
        - parent: the sampled parent node, or null on round 1
        - cognition.matches: retrieved durable heuristics relevant to this objective

      If a parent is present, evolve it: improve on the parent's code using the cognition
      hints. If parent is null, write a full candidate from scratch.

      Write the COMPLETE candidate file to:
        /workspace/.evolve_runs/main/steps/<step_name>/code
      substituting <step_name> from context.json. Create the directory if needed. Write
      only that one file, no commentary in the file.

      Finish with the required agent_status block; your verdict is informational.
    inputs: []
    outputs: []
    maxVisits: 3
    transitions:
      - to: orchestrator

  evaluate:
    type: deterministic
    description: Run the configured evaluator on this round's candidate.
    container: true
    resultFile: .evolve_runs/main/current/result.json
    run:
      - [
          '/opt/workflow-venv/bin/python',
          '/workflow-scripts/evolve_result.py',
          'evaluate',
          '--run-dir',
          '/workspace/.evolve_runs/main',
          '--step-from-current',
          '--code-from-current',
          '--result-file',
          '/workspace/.evolve_runs/main/current/result.json',
        ]
    transitions:
      - to: orchestrator
        when: { verdict: evaluated }
      - to: human_escalation
        when: { verdict: evaluator_blocked }
      - to: failed
        when: { verdict: result_file_error }
      - to: failed

  analyzer:
    type: agent
    description: Write a transferable lesson for the round.
    persona: global
    prompt: |
      Analyze the round that just completed and write a SHORT transferable lesson.

      Read /workspace/.evolve_runs/main/current/context.json, the just-evaluated
      result at /workspace/.evolve_runs/main/current/result.json, and this round's
      candidate at the step path named in context.json.

      Write a concise markdown lesson to:
        /workspace/.evolve_runs/main/current/analysis.md
      Keep it to a few sentences. Do not restate the score; capture the transferable insight.

      Finish with the required agent_status block; your verdict is informational.
    inputs: []
    outputs: []
    maxVisits: 3
    transitions:
      - to: orchestrator

  analysis_record:
    type: deterministic
    description: The single durable engine node-write; commit the round with its lesson and parent.
    container: true
    resultFile: .evolve_runs/main/current/analysis_record.json
    run:
      - [
          '/opt/workflow-venv/bin/python',
          '/workflow-scripts/evolve_result.py',
          'attach_analysis',
          '--run-dir',
          '/workspace/.evolve_runs/main',
          '--step-from-current',
          '--name-from-current',
          '--parent-from-current',
          '--code-from-current',
          '--results-from-current',
          '--analysis-file',
          '/workspace/.evolve_runs/main/current/analysis.md',
          '--result-file',
          '/workspace/.evolve_runs/main/current/analysis_record.json',
        ]
    transitions:
      - to: orchestrator
        when: { verdict: recorded }
      - to: failed
        when: { verdict: needs_repair }
      - to: failed
        when: { verdict: result_file_error }
      - to: failed

  human_escalation:
    type: human_gate
    description: >
      Human review when the orchestrator judges the run unrecoverable or the
      evaluator blocked a round. Approve to resume, force a revision back to
      preflight for evaluator/spec repair that preserves existing node validity,
      or abort and start a fresh run if the objective must change.
    acceptedEvents: [APPROVE, FORCE_REVISION, ABORT]
    present:
      - run_spec
    transitions:
      - to: orchestrator
        event: APPROVE
      - to: preflight
        event: FORCE_REVISION
        actions:
          - { type: resetVisitCounts, stateIds: [preflight, orchestrator] }
      - to: aborted
        event: ABORT

  final_summary:
    type: agent
    description: >
      Read the durable run state and the best node, and write a human-readable
      report summarizing the run for the final human review.
    persona: global
    prompt: |
      The Evolve run has reached its round budget. Produce a concise, human-readable
      report of what the run found, for a human reviewer who will decide whether to
      accept the result or request more rounds.

      Read the durable run state:
        - /workspace/.evolve_runs/main/run_spec.yaml - the objective, evaluator, and
          budget.max_rounds (= N).
        - /workspace/.evolve_runs/main/database_data/nodes.json - every recorded node
          (id, parent, score, analysis). Count its "nodes" map for done_rounds.
        - /workspace/.evolve_runs/main/best/ - the best snapshot per improving round;
          the highest-scoring node is the run's result.

      Write a Markdown report to BOTH of these paths:
        /workspace/.evolve_runs/main/final_report.md
        /workspace/.workflow/final_report/final_report.md
      Create the /workspace/.workflow/final_report/ directory if it does not exist.
      The report MUST contain, in this order:
        1. The objective (one line, from run_spec.yaml).
        2. done_rounds vs budget.max_rounds.
        3. The best node: its id, its score, and its analysis/lesson.
        4. The score trajectory across rounds (id -> score), so the reviewer can see
           whether the search was still improving at the budget cap.
        5. A one-paragraph recommendation: is the result acceptable, or would more
           rounds plausibly help.

      Do NOT re-run the evaluator, write candidates, or modify any node. You only read
      durable state and write final_report.md.

      Finish with the required agent_status block; your verdict is informational.
    inputs:
      - run_spec
    outputs:
      - final_report
    transitions:
      - to: final_review

  final_review:
    type: human_gate
    description: >
      Human review of the completed run. Approve to finish, force a revision to run
      more rounds, or abort.
    acceptedEvents: [APPROVE, FORCE_REVISION, ABORT]
    present:
      - final_report
    transitions:
      - to: done
        event: APPROVE
      - to: orchestrator
        event: FORCE_REVISION
        actions:
          - { type: resetVisitCounts, stateIds: [orchestrator] }
      - to: aborted
        event: ABORT

  done:
    type: terminal
    description: Round budget reached and human-approved; candidates scored and recorded.

  failed:
    type: terminal
    description: >
      Mechanical failure - preflight blocked, sampler/engine crash, result-file
      contract error, record failure, or round-limit wedge backstop.

  aborted:
    type: terminal
    description: Operator aborted the run at a human gate.
