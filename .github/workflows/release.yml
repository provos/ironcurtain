name: Release

on:
  push:
    tags:
      - 'v*'
      - '!*/v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          # Node 24 has an isolated-vm 7.0.0 prebuild; Node 22 does not (it would
          # source-compile via node-gyp on the publish critical path). The Node
          # version only affects build/test speed here — the published npm
          # artifact is IronCurtain's own JS and does not bundle isolated-vm
          # (consumers install it themselves) — so pin a prebuilt line.
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install Aikido safe-chain for supply chain protection
        run: npm install -g @aikidosec/safe-chain && safe-chain setup

      - name: Upgrade npm for OIDC trusted publishing support
        run: npx npm@latest install -g npm@latest

      - run: npm ci
      - run: npm run build --workspace=packages/memory-mcp-server
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        run: npm publish --provenance

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \\[${version}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
