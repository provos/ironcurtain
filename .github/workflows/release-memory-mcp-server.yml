name: Release memory-mcp-server

on:
  push:
    tags:
      - 'memory-mcp-server/v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and test only — skip npm publish and the GitHub release'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Resolve release tag and version
        id: meta
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          else
            pkg_version="$(node -p "require('./packages/memory-mcp-server/package.json').version")"
            tag="memory-mcp-server/v${pkg_version}"
          fi
          version="${tag#memory-mcp-server/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (npm publish uses the version in package.json)"

      - name: Install Aikido safe-chain for supply chain protection
        run: npm install -g @aikidosec/safe-chain && safe-chain setup

      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - run: npm ci

      - name: Lint
        run: npm run lint --workspace packages/memory-mcp-server

      - name: Format check
        run: npm run format:check --workspace packages/memory-mcp-server

      - name: Build
        run: npm run build --workspace packages/memory-mcp-server

      - name: Test
        run: npm test --workspace packages/memory-mcp-server

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --workspace packages/memory-mcp-server --provenance

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "memory-mcp-server ${{ steps.meta.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
