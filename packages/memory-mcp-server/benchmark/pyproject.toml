[project]
name = "memory-benchmarks"
version = "0.1.0"
description = "Benchmark harnesses for the memory MCP server"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.9.0",
    "datasets>=3.0.0",
    "openai>=1.50.0",
    "tqdm>=4.66.0",
    "python-dotenv>=1.0.0",
    "nltk>=3.9.0",
    "httpx>=0.27.0",
]

[project.scripts]
longmemeval = "longmemeval.run:main"
locomo = "locomo.run:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["longmemeval", "locomo"]

[dependency-groups]
dev = ["ruff>=0.11.0"]

[tool.ruff]
target-version = "py311"
line-length = 99
