[project]
name = "longmemeval-benchmark"
version = "0.1.0"
description = "LongMemEval benchmark harness for the memory MCP server"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.9.0",
    "datasets>=3.0.0",
    "openai>=1.50.0",
    "tqdm>=4.66.0",
]

[project.scripts]
longmemeval = "longmemeval.run:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["longmemeval"]

[dependency-groups]
dev = ["ruff>=0.11.0"]

[tool.ruff]
target-version = "py311"
line-length = 99
